<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My infinity love May <3</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html {
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
      color: #fff;
    }
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 10;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }
    h1 {
      font-size: 4.5rem;
      margin-bottom: 20px;
      text-shadow: 0 0 30px #ff69b4, 0 0 60px #ff1493, 0 0 90px #c71585;
      animation: glow 4s ease-in-out infinite alternate;
      letter-spacing: 2px;
    }
    .heart {
      font-size: 8rem;
      animation: heartbeat 2s infinite ease-in-out;
    }
    .floating-text {
      position: absolute;
      color: #ffd700;
      font-size: 2.2rem;
      text-shadow: 0 0 15px #ff4500, 0 0 25px #ff8c00;
      white-space: nowrap;
      pointer-events: none;
      animation: rise 35s linear infinite;
      opacity: 0.85;
      z-index: 5;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493; }
      to   { text-shadow: 0 0 50px #ff69b4, 0 0 100px #ff1493; }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.2); }
    }
    @keyframes rise {
      0%   { transform: translateY(100vh) rotate(-5deg); opacity: 0; }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: translateY(-150px) rotate(360deg); opacity: 0; }
    }
    .player {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <div class="content">
    <h1>My infinity love May <3</h1>
    <div class="heart">💛</div>
  </div>

  <div id="floating"></div>

  <!-- YouTube como audio de fondo: invisible, autoplay, loop, sin controles -->
  <div class="player">
    <iframe 
      id="ytplayer"
      width="1" height="1" style="opacity:0; pointer-events:none;"
      src="https://www.youtube.com/embed/3111wgp89DE?autoplay=1&loop=1&playlist=3111wgp89DE&controls=0&modestbranding=1&showinfo=0&rel=0&enablejsapi=1&mute=0"
      frameborder="0"
      allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>

  <script>
    // Canvas para galaxia/estrellas/partículas (estilo similar a la original)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const particleCount = 280; // Ajusta si va lento (150-300)

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.2 + 0.3;
        this.speedX = Math.random() * 0.6 - 0.3;
        this.speedY = Math.random() * 0.6 - 0.3;
        this.hue = Math.random() * 60 + 180; // tonos azul-cian-morado para galaxia
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, 0.9)`;
        ctx.shadowBlur = 15;
        ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, 0.8)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < particleCount; i++) {
      particles.push(new Particle());
    }

    function animate() {
      ctx.fillStyle = 'rgba(0,0,0,0.06)'; // rastro suave para efecto galaxia
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // Mensajes flotantes románticos (como en la original)
    const messages = [
      "My infinity love May <3",
      "Eres mi galaxia favorita ✨",
      "Te amo con todo mi universo 💫",
      "Por siempre tuya/o ∞",
      "Mi luz eterna May <3",
      "Brillas más que mil estrellas 🌟",
      "Contigo hasta el fin del cosmos 💛",
      "My infinity... solo tú <3"
    ];

    function createFloatingText() {
      const text = document.createElement('div');
      text.className = 'floating-text';
      text.textContent = messages[Math.floor(Math.random() * messages.length)];
      text.style.left = Math.random() * 80 + 10 + '%';
      text.style.animationDuration = (25 + Math.random() * 20) + 's';
      text.style.animationDelay = Math.random() * 8 + 's';
      document.getElementById('floating').appendChild(text);

      setTimeout(() => text.remove(), 45000);
    }

    setInterval(createFloatingText, 2800); // Nuevo mensaje cada \~2.8s
  </script>
</body>
</html>
